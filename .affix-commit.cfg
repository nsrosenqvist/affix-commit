# affix-commit configuration
# Place this file at the root of your repository or at ~/.affix-commit.cfg

# Regex pattern to extract ticket ID from branch name
# Default: [A-Z]+-[0-9]+  (matches JIRA-123, PROJ-42, etc.)
# ticket_pattern='[A-Z]+-[0-9]+'

# Regex pattern for branches where ticket injection should be skipped
# Default: ^(master|main|dev|develop|development|release)$
# ignored_branches='^(master|main|dev|develop|development|release)$'

# If true, silently skip when no ticket ID is found in the branch name
# If false (default), exit with an error when no ticket is found
# ignore_missing_tickets=false

# Conventional commit type used when the message is not already conventional
# Default: chore  (e.g., "fixed bug" → "chore(TICKET): fixed bug")
# default_type=chore

# If true, infer the conventional commit type from the branch name prefix
# (segment before the first '/'), looked up in branch_type_map.
# Falls back to default_type when the prefix is unknown or there is no '/'.
# Explicit conventional types in the commit message always win.
# Default: false
# infer_type_from_branch=false

# Comma-separated map of <branch-prefix>:<commit-type> used when
# infer_type_from_branch=true. Default covers the conventional-commit set
# plus the common feature/, bugfix/, hotfix/ aliases.
# branch_type_map='feat:feat,fix:fix,chore:chore,refactor:refactor,docs:docs,test:test,style:style,perf:perf,build:build,ci:ci,revert:revert,feature:feat,bugfix:fix,hotfix:fix'
